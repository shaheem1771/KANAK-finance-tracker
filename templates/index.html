<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Finance Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Personal Finance Tracker</h1>
      </header>

      <section class="summary">
        <strong>Total:</strong> ${{ '%.2f' % (total or 0) }}
      </section>

      <section>
        {% if expenses %}
        <table class="expenses">
          <thead>
            <tr><th>Date</th><th>Category</th><th class="amount">Amount</th><th>Note</th></tr>
          </thead>
          <tbody>
            {% for e in expenses %}
            <tr>
              <td>{{ e.date }}</td>
              <td>{{ e.category }}</td>
              <td class="amount">${{ '%.2f' % e.amount }}</td>
              <td>{{ e.note }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        {% else %}
        <p class="muted">No expenses yet — add rows to `expenses.csv`.</p>
        {% endif %}
      </section>
    </main>
    <script src="/static/script.js"></script>
  </body>
</html>
